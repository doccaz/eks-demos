# Role: Senior Cloud-Native Architect (CAPI & Rancher Turtles)
# Note: Templates are immutable. To update settings, you must create a new template name (e.g., -v2) and update the ClusterClass reference.
# The ClusterClass will show an InternalError until the referenced template objects are actually applied to the cluster.

apiVersion: cluster.x-k8s.io/v1beta1
kind: ClusterClass
metadata:
  name: my-eks-test-class-v2
  namespace: default
  labels:
    cluster.x-k8s.io/managed-by: rancher
spec:
  controlPlane:
    ref:
      apiVersion: controlplane.cluster.x-k8s.io/v1beta2
      kind: AWSManagedControlPlaneTemplate
      name: my-eks-test-control-plane-v4
  infrastructure:
    ref:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
      kind: AWSManagedClusterTemplate
      name: my-eks-test-cluster-v1
  workers:
    machineDeployments:
      - class: default-worker
        template:
          bootstrap:
            ref:
              apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
              kind: EKSConfigTemplate
              name: my-eks-test-bootstrap-v1
          infrastructure:
            ref:
              apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
              kind: AWSMachineTemplate
              name: my-eks-test-node-group-v2
