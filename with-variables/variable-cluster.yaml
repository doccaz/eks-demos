apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: workload-cluster-01
  namespace: default
spec:
  topology:
    # Select size (medium/large/xlarge) and version (v1-33/v1-34) here
    class: eks-v1-33-large 
    version: v1.33.0
    workers:
      machineDeployments:
        - class: default-worker
          name: md-0
          replicas: 3

