# --- VERSIONED CONTROL PLANE ---
apiVersion: controlplane.cluster.x-k8s.io/v1beta2
kind: AWSManagedControlPlaneTemplate
metadata:
  name: eks-control-plane-v1-33
  namespace: default
spec:
  template:
    spec:
      version: v1.33.0
      region: us-east-1
      sshKeyName: default-key
      # This configuration populates the aws-auth ConfigMap
      iamAuthenticatorConfig:
        mapRoles:
          - rolearn: "arn:aws:iam::058264532137:role/nodes.cluster-api-provider-aws.sigs.k8s.io"
            username: "system:node:{{EC2PrivateDNSName}}"
            groups:
              - "system:bootstrappers"
              - "system:nodes"
        mapUsers:
          - userarn: "arn:aws:iam::058264532137:user/emendonca-remote"
            username: "admin"
            groups:
              - "system:masters"
      addons:
        - name: aws-ebs-csi-driver
          version: v1.57.1-eksbuild.1
          conflictResolution: overwrite
        - name: coredns
          version: v1.12.1-eksbuild.2
          conflictResolution: overwrite
        - name: kube-proxy
          version: v1.33.3-eksbuild.4
          conflictResolution: overwrite
        - name: vpc-cni
          version: v1.20.4-eksbuild.2
          conflictResolution: overwrite
---
# --- SIZE: MEDIUM ---
apiVersion: cluster.x-k8s.io/v1beta1
kind: ClusterClass
metadata:
  name: eks-v1-33-medium
  namespace: default
spec:
  infrastructure:
    ref:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
      kind: AWSManagedClusterTemplate
      name: cluster-fixed
  controlPlane:
    ref:
      apiVersion: controlplane.cluster.x-k8s.io/v1beta2
      kind: AWSManagedControlPlaneTemplate
      name: eks-control-plane-v1-33
  workers:
    machineDeployments:
      - class: default-worker
        template:
          bootstrap:
            ref:
              apiVersion: bootstrap.cluster.x-k8s.io/v1beta2
              kind: EKSConfigTemplate
              name: bootstrap-fixed
          infrastructure:
            ref:
              apiVersion: infrastructure.cluster.x-k8s.io/v1beta2
              kind: AWSMachineTemplate
              name: worker-medium
---
