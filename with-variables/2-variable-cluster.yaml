apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: workload-cluster-01
  namespace: default
spec:
  topology:
    # Upgrade workflow: change class and version together
    # Available: eks-v1-31-{medium,large,xlarge}, eks-v1-32-{medium,large,xlarge}
    class: eks-v1-31-large
    version: v1.31.0
    workers:
      machineDeployments:
        - class: default-worker
          name: md-0
          replicas: 3
